<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mestre dos Assados | Cardápio online</title>
  <style>
    /* --- Configurações Gerais & Cores --- */
    :root {
      --primary: #e63946;
      --primary-hover: #c1121f;
      --dark: #1d3557;
      --light: #f8f9fa;
      --text: #ffffff;
      --text-light: #b3b3b3;
      --card-bg: #1a1a1a;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #000000 0%, #150204 50%, #300307 100%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.6;
      padding-bottom: 60px;
    }

    /* --- Novo Banner com a Logo Oficial --- */
    header {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8));
      text-align: center;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-banner {
      max-width: 350px;
      width: 100%;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
      transition: transform 0.3s ease;
    }

    .logo-banner:hover {
      transform: scale(1.03);
    }

    .main-layout {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      gap: 30px;
    }

    .container {
      flex: 1;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
      color: var(--white);
      position: relative;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background-color: var(--primary);
      margin: 10px auto 0;
    }

    /* --- Grid do Cardápio --- */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 60px;
    }

    .menu-item {
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      transition: transform 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-item:hover {
      transform: translateY(-5px);
      border-color: rgba(230, 57, 70, 0.3);
    }

    .item-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background-color: #222;
    }

    .item-info {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .item-title {
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 8px;
    }

    .item-desc {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 15px;
    }

    .item-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .item-price {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
    }

    .btn-add {
      background-color: var(--primary);
      color: var(--white);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background-color: var(--primary-hover);
    }

    /* --- Seção Localização (Maps) --- */
    .maps-section {
      background-color: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(230, 57, 70, 0.15);
      padding: 40px 20px;
      border-radius: 12px;
      margin-bottom: 60px;
      text-align: center;
    }

    .maps-section p {
      color: #dddddd;
    }

    .map-container {
      position: relative;
      overflow: hidden;
      padding-top: 350px;
      border-radius: 8px;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .map-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* --- Seção do Carrinho Lateral --- */
    .cart-section {
      width: 350px;
      background-color: #111;
      border: 1px solid rgba(230, 57, 70, 0.2);
      border-radius: 12px;
      padding: 20px;
      height: fit-content;
      position: sticky;
      top: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
    }

    .cart-section h3 {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      margin-bottom: 15px;
      text-align: center;
    }

    .cart-items {
      max-height: 350px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .cart-item-info {
      flex: 1;
      padding-right: 10px;
    }

    .cart-item-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .cart-item-price {
      font-size: 0.85rem;
      color: var(--primary);
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-qty {
      background-color: #222;
      color: white;
      border: 1px solid #444;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .btn-qty:hover {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .btn-checkout {
      display: block;
      width: 100%;
      background-color: #25d366;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.2s;
      text-align: center;
    }

    .btn-checkout:hover {
      background-color: #128c7e;
    }

    .empty-cart {
      text-align: center;
      color: var(--text-light);
      padding: 20px 0;
      font-style: italic;
    }

    /* --- Rodapé & Redes Sociais --- */
    footer {
      background-color: rgba(0, 0, 0, 0.9);
      border-top: 2px solid var(--primary);
      color: var(--white);
      text-align: center;
      padding: 40px 20px;
      margin-top: 40px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    .social-links a {
      color: var(--white);
      text-decoration: none;
      background-color: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 500;
      transition: background 0.3s, color 0.3s;
    }

    .social-links a:hover {
      background-color: var(--primary);
      color: var(--white);
    }

    footer p {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    /* --- Responsividade --- */
    @media (max-width: 992px) {
      .main-layout { flex-direction: column; }
      .cart-section { width: 100%; position: static; }
    }

    @media (max-width: 768px) {
      .logo-banner { max-width: 260px; }
      .map-container { padding-top: 300px; }
      .social-links { flex-direction: column; align-items: center; gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <img src="logo.jpeg" alt="Mestre dos Assados Logo" class="logo-banner">
</header>

<div class="main-layout">

  <div class="container">
    <section class="maps-section">
      <h2>Nossa Localização</h2>
      <p>R. Guia Lopes, 3672 - Rondônia, Novo Hamburgo - RS</p>
      <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3469.7213237198884!2d-51.1147576246377!3d-29.6988894154942!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95194244fe04db41%3A0x8be5fb542718cf94!2sR.%20Guia%20Lopes%2C%203672%20-%20Rond%C3%B4nia%2C%20Novo%20Hamburgo%20-%20RS%2C%2093548-156!5e0!3m2!1spt-BR!2sbr!4v1710000000000!5m2!1spt-BR!2sbr" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>

    <section id="cardapio">
      <h2>Nosso Cardápio</h2>
      <div class="menu-grid" id="menu-container">
      </div>
    </section>
  </div>

  <aside class="cart-section">
    <h3>🛒 Seu Carrinho</h3>
    <div id="cart-items-container" class="cart-items">
    </div>
    <div class="cart-total">
      <span>Total:</span>
      <span id="cart-total-value">R$ 0,00</span>
    </div>
    <button class="btn-checkout" onclick="enviarParaWhatsapp()">📋 Finalizar Pedido pelo WhatsApp</button>
  </aside>

</div>

<footer>
  <h3>Siga-nos nas Redes Sociais</h3>
  <div class="social-links">
    <a href="https://www.instagram.com/mestre.dos.assados10/" target="_blank">📸 Instagram</a>
    <a href="https://facebook.com" target="_blank">👥 Facebook</a>
    <a href="https://wa.me/5551996577659" target="_blank">💬 WhatsApp</a>
  </div>
  <p>© 2026 Mestre dos Assados. Todos os direitos reservados.</p>
</footer>

<script>
  const cardapioItens = [
    { id: 1, nome: "Costela janela", desc:"por quilo", preco: 0.00, img: "https://minervafoods.com/wp-content/uploads/2023/07/tinywow_02-Costela-do-traseiro-com-legumes-assados-JANELA-HOR_29124578-scaled.jpg" },
    { id: 2, nome: "Costela desossada", desc:"por quilo", preco: 0.00, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQEHZOmcCKrmdWaySuniDXeoeuE1RZm1JR5Bf5isVfzH2Cid1wmSZk626Ti&s=10" },
    { id: 3, nome: "Vazio", desc:"por quilo", preco: 0.00, img: "https://damedosassados.com.br/wp-content/uploads/2017/03/VazioMagro.jpeg" },
    { id: 4, nome: "Sobrecoxa", desc:"unidade", preco: 5.00, img: "https://www.sumerbol.com.br/uploads/images/2017/10/coxa-e-sobrecoxa-de-frango-assada-ao-vinho-1509133757.jpg" },
    { id: 5, nome: "Salsição", desc:"unidade", preco: 4.00, img: "https://p2.trrsf.com/image/fget/cf/1200/630/middle/images.terra.com/2022/07/17/109317278-receitas-com-linguica-de-churrasco-toscana.jpg" },
    { id: 6, nome: "Linguiça", desc:"por quilo", preco: 0.00, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuTi8oZLSOi9gd2GLXawoxreh_IUIx5WgAjwiYEWFJ_m2cZo-s9I-BRqk&s=10" },
    { id: 7, nome: "Frango assado inteiro + polenta", desc: "Acompanha polenta da máquina", preco: 50.00, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlHVhanmayEgqDSwhOso_lmTSCxFK5YFoBHWrGQFvHWS3g7dgkY3lrD_M&s=10" },
    { id: 8, nome: "Porção de polenta frita", desc: "Frita na hora", preco: 8.00, img: "https://cozinha365.com.br/wp-content/uploads/2025/10/Polenta-frita-na-airfryer-1024x1024.png" },
    { id: 9, nome: "Maionese", desc: "500 gramas", preco: 10.00, img: "https://claudia.abril.com.br/wp-content/uploads/2020/02/maionese-de-batata.jpg" },
    { id: 10, nome: "Polenta da máquina porção", desc:"", preco: 8.00, img: "https://guiadacozinha.com.br/wp-content/uploads/2021/10/polenta-frita-especial-42871.jpg" },
    { id: 11, nome: "Porção de arroz", desc:"400 gramas", preco: 8.00, img: "https://content.paodeacucar.com/wp-content/uploads/2019/11/arroz-branco-churrasco.jpg" },
    { id: 12, nome: "Água com gás", desc: "", preco: 5.00, img: "https://www.imigrantesbebidas.com.br/bebida/images/products/full/2894-agua-mineral-crystal-com-gas-500ml.jpg?auto=format&fit=crop&w=400&q=80" },
    { id: 13, nome: "Água sem gás", desc: "", preco: 5.00, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmx5MYpuKvllLa4ekT3mnicMZ0gbwb71Dk7WrHrjHoox3tB6-M7Aj3g2kc&s=10" },
    { id: 14, nome: "Guaraná lata", desc: "350ml", preco: 5.00, img: "https://cdn.awsli.com.br/2500x2500/1330/1330028/produto/51587137/a19f18b3f5.jpg" },
    { id: 15, nome: "Coca cola lata", desc: "Lata 350ml.", preco: 6.00, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=400&q=80" },
    { id: 16, nome: "Guaraná", desc: "2 litros", preco: 12.00, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSI6mjlzAVSTXXM3lAa7-jthll6C6Dm_d31rHvqUks3uY4xM0v20HtRRPTC&s=10" },
    { id: 17, nome: "Coca cola", desc: "2 litros", preco: 15.00, img: "https://fortatacadista.vteximg.com.br/arquivos/ids/299392-1000-1000/2301822_7894900027013_BEB-REFRIG.COCA-COLA-2L-PET..jpg" }
  ];

  let carrinho = [];

  function formatarExibicaoPreco(item) {
    if (item.preco === 0) {
      return "pedir por mensagem";
    }
    let sufixo = item.desc === "por quilo" ? " / kg" : "";
    return `R$ ${item.preco.toFixed(2).replace('.', ',')}${sufixo}`;
  }

  function renderizarCardapio() {
    const container = document.getElementById('menu-container');
    container.innerHTML = cardapioItens.map(item => `
        <div class="menu-item">
            <img src="${item.img}" alt="${item.nome}" class="item-img">
            <div class="item-info">
                <div>
                    <h3 class="item-title">${item.nome}</h3>
                    <p class="item-desc">${item.desc}</p>
                </div>
                <div class="item-bottom">
                    <span class="item-price">${formatarExibicaoPreco(item)}</span>
                    <button class="btn-add" onclick="adicionarAoCarrinho(${item.id})">Pedir</button>
                </div>
            </div>
        </div>
    `).join('');
  }

  function adicionarAoCarrinho(id) {
    const produto = cardapioItens.find(item => item.id === id);
    const itemNoCarrinho = carrinho.find(item => item.id === id);

    if (itemNoCarrinho) {
      itemNoCarrinho.quantidade++;
    } else {
      carrinho.push({ ...produto, quantidade: 1 });
    }
    atualizarCarrinho();
  }

  function alterarQuantidade(id, mudanca) {
    const itemNoCarrinho = carrinho.find(item => item.id === id);
    if (itemNoCarrinho) {
      itemNoCarrinho.quantidade += mudanca;
      if (itemNoCarrinho.quantidade <= 0) {
        carrinho = carrinho.filter(item => item.id !== id);
      }
    }
    atualizarCarrinho();
  }

  function atualizarCarrinho() {
    const container = document.getElementById('cart-items-container');
    const totalValue = document.getElementById('cart-total-value');

    if (carrinho.length === 0) {
      container.innerHTML = '<p class="empty-cart">Seu carrinho está vazio.</p>';
      totalValue.innerText = 'R$ 0,00';
      return;
    }

    let total = 0;
    container.innerHTML = carrinho.map(item => {
      const subtotal = item.preco * item.quantidade;
      total += subtotal;

      let textoPrecoCarrinho = item.preco === 0 ? "pedir por mensagem" : `R$ ${item.preco.toFixed(2).replace('.', ',')}`;

      return `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.nome}</div>
            <div class="cart-item-price">${textoPrecoCarrinho}</div>
          </div>
          <div class="cart-item-actions">
            <button class="btn-qty" onclick="alterarQuantidade(${item.id}, -1)">-</button>
            <span>${item.quantidade}</span>
            <button class="btn-qty" onclick="alterarQuantidade(${item.id}, 1)">+</button>
          </div>
        </div>
      `;
    }).join('');

    totalValue.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
  }

  function enviarParaWhatsapp() {
    if (carrinho.length === 0) {
      alert("Seu carrinho está vazio! Adicione itens antes de finalizar.");
      return;
    }

    let numeroWhatsapp = "5551996577659";
    let mensagem = "*Novo Pedido - Mestre dos Assados*\n\n";
    let total = 0;
    let temItemConsulta = false;

    carrinho.forEach(item => {
      if (item.preco === 0) {
        temItemConsulta = true;
        mensagem += `• *${item.quantidade}x* ${item.nome} _(Preço Sob Consulta)_\n`;
      } else {
        const subtotal = item.preco * item.quantidade;
        total += subtotal;
        mensagem += `• *${item.quantidade}x* ${item.nome} _(R$ ${item.preco.toFixed(2).replace('.', ',')} un.)_\n`;
      }
    });

    if (total > 0) {
      mensagem += `\n*Total dos itens fixos:* R$ ${total.toFixed(2).replace('.', ',')}\n`;
    }

    if (temItemConsulta) {
      mensagem += `\n*Aviso:* O pedido contém carne por KG. O valor final exato será confirmado após a pesagem! ⚖️\n`;
    }

    let urlMensagem = encodeURIComponent(mensagem);
    let linkWhatsapp = `https://wa.me/${numeroWhatsapp}?text=${urlMensagem}`;

    window.open(linkWhatsapp, '_blank');
  }

  window.onload = () => {
    renderizarCardapio();
    atualizarCarrinho();
  };
</script>
</body>
</html>
